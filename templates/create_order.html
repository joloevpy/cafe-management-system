{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Create Order</h2>

    <form method="post" class="mt-3">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.shift.label_tag }}
            {{ form.shift }}
        </div>

        <div class="mb-3">
            {{ form.table.label_tag }}
            {{ form.table }}
        </div>

        <div class="mb-3">
            {{ form.promo_code.label_tag }}
            {{ form.promo_code }}
        </div>

        <div class="mb-3">
            {{ form.status.label_tag }}
            {{ form.status }}
        </div>

        <button type="submit" class="btn btn-success">
            Create Order
        </button>

        <a href="{% url 'orders' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
