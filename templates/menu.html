{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1>Menu</h1>

    <a href="{% url 'create_menu_item' %}" class="btn btn-success mb-3">
        Create Menu Item
    </a>

    {% if menu_items %}
    <table class="table table-striped table-bordered">
        <tr>
            <th>Name</th>
            <th>Price</th>
        </tr>

        {% for item in menu_items %}
        <tr>
            <td>{{ item.name }}</td>
            <td>{{ item.price }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <p>No menu items yet.</p>
    {% endif %}

</div>

{% endblock %}
