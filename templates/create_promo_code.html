{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Create Promo Code</h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.name.label_tag }}
            {{ form.name }}
        </div>

        <div class="mb-3">
            {{ form.discount_percent.label_tag }}
            {{ form.discount_percent }}
        </div>

        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}

        <button type="submit" class="btn btn-success">
            Save
        </button>

        <a href="{% url 'promo_codes' %}" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

{% endblock %}
