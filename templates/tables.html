{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h1>Tables</h1>

    <a href="{% url 'create_table' %}"
       class="btn btn-success mb-3">
        Create Table
    </a>

    <table class="table table-striped table-bordered">

        <thead>
            <tr>
                <th>Number</th>
                <th>Occupied</th>
            </tr>
        </thead>

        <tbody>

        {% for table in tables %}
            <tr>
                <td>{{ table.number }}</td>

                <td>
                    {% if table.is_occupied %}
                        Yes
                    {% else %}
                        No
                    {% endif %}
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="2">
                    No tables found.
                </td>
            </tr>
        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
